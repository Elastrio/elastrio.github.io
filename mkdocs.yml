site_name: Elastrio Docs
site_url: https://docs.elastrio.com
theme:
  name: material
  favicon: assets/favicon.ico
  icon:
    logo: fontawesome/solid/w
  logo: assets/icon.png
  font:
    text: Merriweather Sans
    code: Red Hat Mono
  language: en 
  palette:
        # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default 
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

  features:
    - navigation.footer
    - header.autohide
    - announce.dismiss
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.follow
    - toc.integrate
    - navigation.top
    - diagrams  # Add this line

nav:
  - Home: index.md
  - About:
      - Team: about/team.md
      - Contact: about/contact.md
  - Blog: blog/index.md
  - Documentation:
      - Introduction: introduction.md
      - Getting Started: getting-started.md
      - Examples:
          - Code Examples: code-exaples.md  # Corrected filename
          - Diagrams: diagram-examples.md
          - Content Tabs: content-tabs.md
          - Admonitions: admonitions.md
      - API: api.md

markdown_extensions:
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details

extra:
  social:
    - icon: simple/youtube
      link: https://youtube.com/
    - icon: simple/linkedin
      link: https://www.linkedin.com/in/goranradanovic/
  alternate:
    - name: English
      link: / 
      lang: en
    - name: Norwegian
      link: /no/
      lang: no
  homepage: /
  consent:
    title: Cookie consent
    description: >- 
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
    actions:
      - accept
      - manage

plugins:
  - privacy
  - blog:
      blog_dir: blog
      post_date_format: medium
      post_url_format: "{slug}"
      post_excerpt: required
      post_excerpt_max_authors: 1
      post_readtime: true
      archive: true
      categories: true
      pagination: true
      pagination_per_page: 5
  - search
  - tags

extra_javascript:
  - https://unpkg.com/mermaid/dist/mermaid.min.js  # Add this line

copyright: Copyright &copy; 2024 Goran